<!DOCTYPE html>
<html>
<body>
    <div id="result"></div>

    <script>
        const query = window.location.search.substring(1);
        const output = document.getElementById('result');

        if (!query) {
            output.innerText = "Error: No query in URL";
        } else {
            // Load the clean pi.txt file
            fetch('pi.txt')
                .then(res => res.text())
                .then(piData => {
                    const index = piData.indexOf(query);
                    
                    // This is the ONLY time text is placed in the 'result' div
                    output.innerText = (index !== -1) ? index : "-1";
                })
                .catch(() => {
                    output.innerText = "Error: pi.txt missing";
                });
        }
    </script>
</body>
</html>
