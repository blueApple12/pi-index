<!DOCTYPE html>
<html>
<body>
    <div id="result"></div>

    <script>
        const query = window.location.search.substring(1);
        const output = document.getElementById('result');

        if (!query) {
            output.innerText = "Error: No query in URL";
        } else {
            fetch('pi.txt')
                .then(res => res.text())
                .then(piData => {
                    // Shorter logic: No if-statement needed.
                    // Found at index 0 becomes 1
                    // Not found (-1) becomes 0
                    output.innerText = piData.indexOf(query) + 1;
                })
                .catch(() => {
                    output.innerText = "Error: pi.txt missing";
                });
        }
    </script>
</body>
</html>
